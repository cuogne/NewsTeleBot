name: Build, test and push Docker Image

on:
  push:
    branches: [main]

jobs:
  ci-pipeline:
    name: test-build-push
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
    
      - name: Download dependencies
        run: go mod download

      - name: Run crawl test 
        run: go test -v ./test/crawl_test.go

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # build docker image with cache
      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -t ${{ secrets.DOCKER_USERNAME }}/news-telebot:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/news-telebot:${{ github.sha }} \
            --push .

      # - name: Build and push Docker image
      #   run: |
      #     docker buildx build --platform linux/amd64 -t ${{ secrets.DOCKER_USERNAME }}/news-telebot:latest --push .